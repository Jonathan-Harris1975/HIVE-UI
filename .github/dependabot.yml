version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/London
    open-pull-requests-limit: 10
    versioning-strategy: increase-if-necessary
    groups:
      production-dependencies:
        dependency-type: production
      development-tooling:
        dependency-type: development
