name: HIVE-UI CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hive-ui-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck, lint, build and verify
        run: npm run check

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Upload production bundle
        uses: actions/upload-artifact@v4
        with:
          name: hive-ui-dist-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 14
